name: deploy v2 product api production

on:
  workflow_dispatch:
  pull_request:
    types: [ closed ]
    branches:
      - 'release/product'

permissions:
  contents: write
  actions: read

concurrency:
  group: "deploy-product-production"
  cancel-in-progress: true

env:
  IMAGE_NAME: bottlenote-product-api

jobs:
  verify-release-pull-request-gate:
    name: verify release pull request gate
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - name: Verify release pull request gate passed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "[release-pull-request-gate] 시작: 릴리즈 배포 전 pull request gate 통과 이력을 확인합니다."
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "[release-pull-request-gate] manual_dispatch=true gate verification skipped"
            exit 0
          fi
          pull_request_number="${{ github.event.pull_request.number }}"
          pull_request_base_ref="${{ github.event.pull_request.base.ref }}"
          pull_request_head_ref="${{ github.event.pull_request.head.ref }}"
          pull_request_head_sha="${{ github.event.pull_request.head.sha }}"
          [[ "$pull_request_head_ref" == "main" ]] || { echo "::error::release deployment requires pull request head to be main, got $pull_request_head_ref"; exit 1; }
          api_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/release-pull-request-gate.yml/runs?event=pull_request&head_sha=${pull_request_head_sha}&status=success&per_page=20"
          runs_json="$(curl -fsSL -H "Authorization: Bearer *** -H "Accept: application/vnd.github+json" "$api_url")" || { echo "::error::failed to query release pull request gate evidence"; exit 1; }
          RUNS_JSON="$runs_json" python3 - "$pull_request_number" "$pull_request_base_ref" "$pull_request_head_sha" <<'PY'
          import json, os, sys
          number, base_ref, head_sha = sys.argv[1:4]
          data = json.loads(os.environ["RUNS_JSON"])
          for run in data.get("workflow_runs", []):
              if run.get("event") != "pull_request" or run.get("conclusion") != "success" or run.get("head_sha") != head_sha:
                  continue
              for pull_request in run.get("pull_requests") or []:
                  if str(pull_request.get("number")) == number and pull_request.get("base", {}).get("ref") == base_ref:
                      print(f"[release-pull-request-gate] gate_success run_id={run.get('id')}")
                      sys.exit(0)
          print(f"::error::no successful release pull request gate run found for pull request #{number} base={base_ref} head_sha={head_sha}", file=sys.stderr)
          sys.exit(1)
          PY

  build-and-push:
    needs: verify-release-pull-request-gate
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-24.04-arm
    outputs:
      version: ${{ steps.version.outputs.version }}
      image-tag: ${{ steps.version.outputs.image-tag }}
      image-digest: ${{ steps.build.outputs.image-digest }}
    steps:
      - name: checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GIT_ACCESS_TOKEN }}

      - name: setup jdk
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: setup gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: calculate next product release version
        id: version
        env:
          PREFIX: product
        run: |
          git fetch --tags origin
          TARGET_SHA="${{ github.event.pull_request.merge_commit_sha || github.sha }}"
          VERSION="$(python3 - "$PREFIX" "$TARGET_SHA" <<'PY'
          import re, subprocess, sys
          prefix, target_sha = sys.argv[1:3]
          pattern = re.compile(rf"^{re.escape(prefix)}/v(\d+)\.(\d+)\.(\d+)$")
          versions = []
          for tag in subprocess.check_output(["git", "tag", "--list", f"{prefix}/v*"], text=True).splitlines():
              tag = tag.strip()
              match = pattern.match(tag)
              if not match:
                  continue
              version = tuple(map(int, match.groups()))
              commit = subprocess.check_output(["git", "rev-list", "-n", "1", tag], text=True).strip()
              if target_sha and commit == target_sha:
                  print(".".join(map(str, version)))
                  sys.exit(0)
              versions.append(version)
          major, minor, patch = max(versions) if versions else (0, 0, 0)
          print(f"{major}.{minor}.{patch + 1}")
          PY
          )"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "image-tag=${PREFIX}_${VERSION}" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: build product module
        run: |
          ./gradlew :bottlenote-product-api:build -x test -x asciidoctor --build-cache --parallel

      - name: build and push to registry
        id: build
        uses: ./.github/actions/docker-build-push
        with:
          registry-url: ${{ secrets.REGISTRY_ADDRESS }}
          registry-username: ${{ secrets.REGISTRY_USERNAME }}
          registry-password: ${{ secrets.REGISTRY_PASSWORD }}
          image-name: ${{ env.IMAGE_NAME }}
          image-tag: product_${{ steps.version.outputs.version }}
          additional-tags: product_latest
          dockerfile: Dockerfile
          context: .
          platforms: linux/arm64
          cache-scope: product-production
          image-title: "BottleNote Product API"
          image-description: "BottleNote Product API Server"
          image-vendor: "BottleNote"
          image-authors: "BottleNote Team"
          sign-image: 'true'
          cosign-key-path: 'git.environment-variables/storage/docker-registry/cosign.key'
          cosign-password: ${{ secrets.COSIGN_PASSWORD }}

  update-production:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GIT_ACCESS_TOKEN }}

      - name: setup kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: update production image tag
        run: |
          IMAGE_TAG="${{ needs.build-and-push.outputs.image-tag }}"
          REGISTRY="${{ secrets.REGISTRY_ADDRESS }}"

          echo "Updating production image tag: $IMAGE_TAG"

          cd git.environment-variables
          git checkout main

          cd deploy/overlays/production
          kustomize edit set image \
            bottlenote-product-api=${REGISTRY}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}

          echo "production kustomization.yaml updated"

      - name: commit and push with retry
        run: |
          cd git.environment-variables

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add deploy/overlays/production/kustomization.yaml

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore(product): update production image tag to ${{ needs.build-and-push.outputs.image-tag }}

          Updated by GitHub Actions
          Commit: ${{ github.sha }}
          Branch: ${{ github.ref_name }}
          Workflow: ${{ github.workflow }}"

          for i in {1..5}; do
            git pull --rebase origin main && git push origin main && break
            echo "Push failed, retry $i/5..."
            sleep $((i * 2))
          done

          echo "Production deployment triggered"

  create-release-tag:
    needs: [build-and-push, update-production]
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: checkout release ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: create product release tag
        env:
          VERSION: ${{ needs.build-and-push.outputs.version }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail
          TAG="product/v${VERSION}"
          git fetch --tags origin
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Release tag already exists: ${TAG}"
            exit 0
          fi
          git tag -a "${TAG}" "${MERGE_SHA}" -m "Release ${TAG}"
          git push origin "refs/tags/${TAG}"
          echo "Created release tag: ${TAG} -> ${MERGE_SHA}"


