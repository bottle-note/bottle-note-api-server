name: deploy v2 product api production

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: 'Product release tag, for example product/v1.2.3'
        required: true
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: deploy-product-production-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: true

env:
  IMAGE_NAME: bottlenote-product-api

jobs:
  verify-product-release:
    name: verify product release publish
    runs-on: ubuntu-latest
    outputs:
      release-tag: ${{ steps.release.outputs.release-tag }}
      version: ${{ steps.release.outputs.version }}
      image-tag: ${{ steps.release.outputs.image-tag }}
      tag-sha: ${{ steps.release.outputs.tag-sha }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: resolve product release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_TAG: ${{ github.event.release.tag_name || '' }}
          INPUT_TAG: ${{ inputs.tag || '' }}
        run: |
          set -euo pipefail
          release_tag="${EVENT_TAG:-$INPUT_TAG}"
          [[ "$release_tag" =~ ^product/v[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "::error::product release tag required, got: $release_tag"; exit 1; }
          version="${release_tag#product/v}"
          image_tag="product_${version}"

          git fetch --no-tags origin '+refs/heads/main:refs/remotes/origin/main'
          git fetch --tags origin
          git rev-parse -q --verify "refs/tags/${release_tag}" >/dev/null || { echo "::error::release tag not found: $release_tag"; exit 1; }
          tag_sha="$(git rev-list -n 1 "$release_tag")"
          git merge-base --is-ancestor "$tag_sha" origin/main || { echo "::error::tag commit is not contained in origin/main: $tag_sha"; exit 1; }

          releases_json="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases?per_page=100")"
          RELEASES_JSON="$releases_json" RELEASE_TAG="$release_tag" python3 - <<'PY'
          import json, os, sys
          tag = os.environ['RELEASE_TAG']
          releases = json.loads(os.environ['RELEASES_JSON'])
          release = next((item for item in releases if item.get('tag_name') == tag), None)
          if release is None:
              print(f'::error::release not found for tag: {tag}', file=sys.stderr)
              sys.exit(1)
          if release.get('draft'):
              print('::error::release must be published', file=sys.stderr)
              sys.exit(1)
          if release.get('prerelease'):
              print('::error::production release must not be prerelease', file=sys.stderr)
              sys.exit(1)
          print(f"release_id={release.get('id')}")
          PY

          {
            echo "release-tag=$release_tag"
            echo "version=$version"
            echo "image-tag=$image_tag"
            echo "tag-sha=$tag_sha"
          } >> "$GITHUB_OUTPUT"
          echo "[product-release-deploy] release_tag=$release_tag version=$version image_tag=$image_tag tag_sha=$tag_sha"

  build-and-push:
    name: build and push product image
    needs: verify-product-release
    runs-on: ubuntu-24.04-arm
    outputs:
      image-tag: ${{ needs.verify-product-release.outputs.image-tag }}
      image-digest: ${{ steps.build.outputs.image-digest }}
    steps:
      - name: checkout release tag with submodules
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.verify-product-release.outputs.release-tag }}
          submodules: true
          token: ${{ secrets.GIT_ACCESS_TOKEN }}

      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: setup gradle cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: build product module
        run: |
          ./gradlew :bottlenote-product-api:build -x test -x asciidoctor --build-cache --parallel

      - name: refresh docker build action from main
        run: |
          git fetch --no-tags origin '+refs/heads/main:refs/remotes/origin/main'
          git checkout origin/main -- .github/actions/docker-build-push/action.yml

      - name: build and push to registry
        id: build
        uses: ./.github/actions/docker-build-push
        with:
          registry-url: ${{ secrets.REGISTRY_ADDRESS }}
          registry-username: ${{ secrets.REGISTRY_USERNAME }}
          registry-password: ${{ secrets.REGISTRY_PASSWORD }}
          image-name: ${{ env.IMAGE_NAME }}
          image-tag: ${{ needs.verify-product-release.outputs.image-tag }}
          additional-tags: product_latest
          dockerfile: Dockerfile
          context: .
          platforms: linux/arm64
          cache-scope: product-production
          image-title: "BottleNote Product API"
          image-description: "BottleNote Product API Server"
          image-vendor: "BottleNote"
          image-authors: "BottleNote Team"
          sign-image: 'true'
          cosign-key-path: 'git.environment-variables/storage/docker-registry/cosign.key'
          cosign-password: ${{ secrets.COSIGN_PASSWORD }}

  update-production:
    name: update product production image
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: checkout code with submodules
        uses: actions/checkout@v7
        with:
          submodules: true
          token: ${{ secrets.GIT_ACCESS_TOKEN }}

      - name: setup kustomize
        uses: imranismail/setup-kustomize@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: update production image tag
        run: |
          IMAGE_TAG="${{ needs.build-and-push.outputs.image-tag }}"
          REGISTRY="${{ secrets.REGISTRY_ADDRESS }}"
          echo "Updating product production image tag: $IMAGE_TAG"
          cd git.environment-variables
          git checkout main
          cd deploy/overlays/production
          kustomize edit set image bottlenote-product-api=${REGISTRY}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}
          echo "production kustomization.yaml updated"

      - name: commit and push with retry
        run: |
          cd git.environment-variables
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/overlays/production/kustomization.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(product): update production image tag to ${{ needs.build-and-push.outputs.image-tag }}

          Updated by GitHub Actions
          Release: ${{ needs.verify-product-release.outputs.release-tag }}
          Commit: ${{ needs.verify-product-release.outputs.tag-sha }}
          Workflow: ${{ github.workflow }}"
          for i in {1..5}; do
            git pull --rebase origin main && git push origin main && break
            echo "Push failed, retry $i/5..."
            sleep $((i * 2))
          done
          echo "Product production deployment triggered"
