name: deploy v2 development

on:
  workflow_dispatch:
  workflow_run:
    workflows: [ "ci pipeline" ]
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  actions: read
  deployments: write

concurrency:
  group: "deploy-development"
  cancel-in-progress: true

jobs:
  prepare-build:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-24.04-arm
    outputs:
      short-sha: ${{ steps.versions.outputs.short-sha }}
      product-image-tag: ${{ steps.versions.outputs.product-image-tag }}
      admin-image-tag: ${{ steps.versions.outputs.admin-image-tag }}
    steps:
      - name: checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GIT_ACCESS_TOKEN }}

      - name: setup jdk
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: setup gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: generate image tags
        id: versions
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "short-sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "product-image-tag=product_${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "admin-image-tag=admin_${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Commit SHA: $SHORT_SHA"

      - name: build both modules
        run: |
          ./gradlew :bottlenote-product-api:build :bottlenote-admin-api:build \
            -x test -x asciidoctor --build-cache --parallel

      - name: upload product jar
        uses: actions/upload-artifact@v4
        with:
          name: product-jar
          path: bottlenote-product-api/build/libs/bottlenote-product-api.jar
          retention-days: 1

      - name: upload admin jar
        uses: actions/upload-artifact@v4
        with:
          name: admin-jar
          path: bottlenote-admin-api/build/libs/bottlenote-admin-api.jar
          retention-days: 1

  build-product-image:
    needs: prepare-build
    runs-on: ubuntu-24.04-arm
    outputs:
      image-digest: ${{ steps.build.outputs.image-digest }}
    steps:
      - name: checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GIT_ACCESS_TOKEN }}

      - name: download product jar
        uses: actions/download-artifact@v4
        with:
          name: product-jar
          path: bottlenote-product-api/build/libs/

      - name: build and push to registry
        id: build
        uses: ./.github/actions/docker-build-push
        with:
          registry-url: ${{ secrets.REGISTRY_ADDRESS }}
          registry-username: ${{ secrets.REGISTRY_USERNAME }}
          registry-password: ${{ secrets.REGISTRY_PASSWORD }}
          image-name: bottlenote-product-api
          image-tag: ${{ needs.prepare-build.outputs.product-image-tag }}
          additional-tags: product_latest_development
          dockerfile: Dockerfile
          context: .
          platforms: linux/arm64
          cache-scope: product-development
          image-title: "BottleNote Product API"
          image-description: "BottleNote Product API Server (Development)"
          image-vendor: "BottleNote"
          image-authors: "BottleNote Team"
          sign-image: 'true'
          cosign-key-path: 'git.environment-variables/storage/docker-registry/cosign.key'
          cosign-password: ${{ secrets.COSIGN_PASSWORD }}

  build-admin-image:
    needs: prepare-build
    runs-on: ubuntu-24.04-arm
    outputs:
      image-digest: ${{ steps.build.outputs.image-digest }}
    steps:
      - name: checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GIT_ACCESS_TOKEN }}

      - name: download admin jar
        uses: actions/download-artifact@v4
        with:
          name: admin-jar
          path: bottlenote-admin-api/build/libs/

      - name: build and push to registry
        id: build
        uses: ./.github/actions/docker-build-push
        with:
          registry-url: ${{ secrets.REGISTRY_ADDRESS }}
          registry-username: ${{ secrets.REGISTRY_USERNAME }}
          registry-password: ${{ secrets.REGISTRY_PASSWORD }}
          image-name: bottlenote-admin-api
          image-tag: ${{ needs.prepare-build.outputs.admin-image-tag }}
          additional-tags: admin_latest_development
          dockerfile: Dockerfile-admin
          context: .
          platforms: linux/arm64
          cache-scope: admin-development
          image-title: "BottleNote Admin API"
          image-description: "BottleNote Admin API Server (Development)"
          image-vendor: "BottleNote"
          image-authors: "BottleNote Team"
          sign-image: 'true'
          cosign-key-path: 'git.environment-variables/storage/docker-registry/cosign.key'
          cosign-password: ${{ secrets.COSIGN_PASSWORD }}

  update-development:
    needs: [prepare-build, build-product-image, build-admin-image]
    runs-on: ubuntu-latest
    steps:
      - name: checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GIT_ACCESS_TOKEN }}

      - name: setup kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: update development image tags
        run: |
          PRODUCT_TAG="${{ needs.prepare-build.outputs.product-image-tag }}"
          ADMIN_TAG="${{ needs.prepare-build.outputs.admin-image-tag }}"
          REGISTRY="${{ secrets.REGISTRY_ADDRESS }}"

          echo "Updating development image tags:"
          echo "  Product: $PRODUCT_TAG"
          echo "  Admin: $ADMIN_TAG"

          cd git.environment-variables
          git checkout main

          cd deploy/overlays/development
          kustomize edit set image \
            bottlenote-product-api=${REGISTRY}/bottlenote-product-api:${PRODUCT_TAG} \
            bottlenote-admin-api=${REGISTRY}/bottlenote-admin-api:${ADMIN_TAG}

          echo "development kustomization.yaml updated"

      - name: commit and push with retry
        run: |
          cd git.environment-variables

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add deploy/overlays/development/kustomization.yaml

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore(dev): update development image tags (${{ needs.prepare-build.outputs.short-sha }})

          Product: ${{ needs.prepare-build.outputs.product-image-tag }}
          Admin: ${{ needs.prepare-build.outputs.admin-image-tag }}

          Updated by GitHub Actions
          Commit: ${{ github.sha }}
          Workflow: ${{ github.workflow }}"

          for i in {1..5}; do
            git pull --rebase origin main && git push origin main && break
            echo "Push failed, retry $i/5..."
            sleep $((i * 2))
          done

          echo "Development deployment triggered"

  record-development-deployments:
    needs: [prepare-build, build-product-image, build-admin-image, update-development]
    if: always() && needs.prepare-build.result == 'success'
    runs-on: ubuntu-latest
    env:
      GH_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PRODUCT_IMAGE_TAG: ${{ needs.prepare-build.outputs.product-image-tag }}
      ADMIN_IMAGE_TAG: ${{ needs.prepare-build.outputs.admin-image-tag }}
      PRODUCT_IMAGE_DIGEST: ${{ needs.build-product-image.outputs.image-digest }}
      ADMIN_IMAGE_DIGEST: ${{ needs.build-admin-image.outputs.image-digest }}
      SHORT_SHA: ${{ needs.prepare-build.outputs.short-sha }}
      BUILD_PRODUCT_RESULT: ${{ needs.build-product-image.result }}
      BUILD_ADMIN_RESULT: ${{ needs.build-admin-image.result }}
      UPDATE_RESULT: ${{ needs.update-development.result }}
    steps:
      - name: Register Development deployments
        run: |
          set -euo pipefail
          if [[ "$BUILD_PRODUCT_RESULT" == "success" && "$BUILD_ADMIN_RESULT" == "success" && "$UPDATE_RESULT" == "success" ]]; then
            deployment_state="success"
          else
            deployment_state="failure"
          fi
          create_deployment() {
            local service="$1" image_name="$2" image_tag="$3" image_digest="$4" public_url="$5" status_url="$6"
            python3 - "$service" "$image_name" "$image_tag" "$image_digest" "$public_url" "$status_url" "$deployment_state" <<'PY' >/tmp/development-deployment.json
          import json, os, sys
          service, image_name, image_tag, image_digest, public_url, status_url, state = sys.argv[1:8]
          payload = {
              "name": "Development",
              "description": "개발 API 배포 환경 메타데이터",
              "public_url": public_url,
              "status_url": status_url,
              "service": service,
              "version": image_tag,
              "image_tag": image_tag,
              "image_digest": image_digest,
              "target": {
                  "service": service,
                  "namespace": "bottlenote-development",
                  "deployment": service,
                  "image": f"{image_name}:{image_tag}",
              },
              "source_sha": os.environ["GITHUB_SHA"],
              "workflow_run_id": os.environ["GITHUB_RUN_ID"],
          }
          print(json.dumps({
              "ref": os.environ["GITHUB_SHA"],
              "environment": "Development",
              "description": f"{service} Development deployment",
              "auto_merge": False,
              "required_contexts": [],
              "production_environment": False,
              "transient_environment": False,
              "payload": payload,
          }))
          PY
            curl -fsSL -X POST \
              -H "Authorization: Bearer ${GH_API_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -d @/tmp/development-deployment.json \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/deployments" >/tmp/development-deployment-response.json
            deployment_id="$(python3 -c 'import json; print(json.load(open("/tmp/development-deployment-response.json"))["id"])')"
            python3 - "$public_url" "$deployment_state" "$service" <<'PY' >/tmp/development-status.json
          import json, os, sys
          public_url, state, service = sys.argv[1:4]
          print(json.dumps({
              "state": state,
              "environment": "Development",
              "environment_url": public_url,
              "log_url": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
              "description": f"{service} Development deployment {state}",
              "auto_inactive": False,
          }))
          PY
            curl -fsSL -X POST \
              -H "Authorization: Bearer ${GH_API_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -d @/tmp/development-status.json \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/deployments/${deployment_id}/statuses" >/dev/null
            echo "[deploy-development] service=$service deployment_id=$deployment_id state=$deployment_state"
          }
          create_deployment product-api bottlenote-product-api "$PRODUCT_IMAGE_TAG" "$PRODUCT_IMAGE_DIGEST" https://api.development.bottle-note.com https://api.development.bottle-note.com/actuator/health
          create_deployment admin-api bottlenote-admin-api "$ADMIN_IMAGE_TAG" "$ADMIN_IMAGE_DIGEST" https://admin-api.development.bottle-note.com https://admin-api.development.bottle-note.com/actuator/health
