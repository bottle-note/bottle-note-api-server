name: release draft gate

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Backend service to release'
        required: true
        type: choice
        options:
          - product
          - admin
      tag:
        description: 'Draft release tag, for example product/v1.2.3 or admin/v1.2.3'
        required: true
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: release-draft-gate-${{ inputs.service }}-${{ inputs.tag }}
  cancel-in-progress: true

jobs:
  gate:
    name: validate backend draft release
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      SERVICE: ${{ inputs.service }}
      RELEASE_TAG: ${{ inputs.tag }}
      MAIN_CI_WORKFLOW: ci_pipeline.yml
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select backend release target
        run: |
          set -euo pipefail
          case "$SERVICE" in
            product)
              tag_pattern='^product/v[0-9]+\.[0-9]+\.[0-9]+$'
              image_name='bottlenote-product-api'
              image_tag="product_${RELEASE_TAG#product/v}"
              ;;
            admin)
              tag_pattern='^admin/v[0-9]+\.[0-9]+\.[0-9]+$'
              image_name='bottlenote-admin-api'
              image_tag="admin_${RELEASE_TAG#admin/v}"
              ;;
            *)
              echo "::error::unsupported backend service: $SERVICE"
              exit 1
              ;;
          esac
          [[ "$RELEASE_TAG" =~ $tag_pattern ]] || { echo "::error::invalid release tag for $SERVICE: $RELEASE_TAG"; exit 1; }
          {
            echo "IMAGE_NAME=$image_name"
            echo "IMAGE_TAG=$image_tag"
          } >> "$GITHUB_ENV"
          echo "[release-draft-gate] service=$SERVICE tag=$RELEASE_TAG image=$image_name:$image_tag"

      - name: Fetch main and tags
        run: |
          set -euo pipefail
          git fetch --no-tags origin '+refs/heads/main:refs/remotes/origin/main'
          git fetch --tags origin
          git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null || { echo "::error::release tag not found: $RELEASE_TAG"; exit 1; }
          tag_sha="$(git rev-list -n 1 "$RELEASE_TAG")"
          echo "TAG_SHA=$tag_sha" >> "$GITHUB_ENV"
          echo "[release-draft-gate] tag_sha=$tag_sha"

      - name: Verify tag commit is on main
        run: |
          set -euo pipefail
          git merge-base --is-ancestor "$TAG_SHA" origin/main || { echo "::error::tag commit is not contained in origin/main: $TAG_SHA"; exit 1; }
          echo "[release-draft-gate] tag_on_main=true"

      - name: Verify draft release metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          release_json="$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}")" || { echo "::error::draft release not found for tag: $RELEASE_TAG"; exit 1; }
          RELEASE_JSON="$release_json" python3 - <<'PY'
          import json, os, sys
          data = json.loads(os.environ['RELEASE_JSON'])
          if not data.get('draft'):
              print('::error::release must be draft before production publish', file=sys.stderr)
              sys.exit(1)
          if data.get('prerelease'):
              print('::error::production release must not be marked as prerelease', file=sys.stderr)
              sys.exit(1)
          body = (data.get('body') or '').strip()
          if len(body) < 40:
              print('::error::release changelog is empty or too short', file=sys.stderr)
              sys.exit(1)
          print(f"[release-draft-gate] draft_release=true release_id={data.get('id')} body_length={len(body)}")
          PY

      - name: Verify main CI evidence
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          api_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/${MAIN_CI_WORKFLOW}/runs?branch=main&event=push&head_sha=${TAG_SHA}&status=success&per_page=1"
          ci_json="$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$api_url")" || { echo "::error::failed to query main CI evidence"; exit 1; }
          CI_JSON="$ci_json" python3 - "$MAIN_CI_WORKFLOW" <<'PY'
          import json, os, sys
          workflow = sys.argv[1]
          runs = json.loads(os.environ['CI_JSON']).get('workflow_runs', [])
          if not runs:
              print(f"::error::no successful main push CI run found for {workflow} at tag commit", file=sys.stderr)
              sys.exit(1)
          run = runs[0]
          print(f"[release-draft-gate] main_ci_success={workflow} run_id={run.get('id')}")
          PY

      - name: Write release draft gate summary
        run: |
          set -euo pipefail
          diff_summary="$(git diff --name-status "${RELEASE_TAG}^..${RELEASE_TAG}" | head -200 || true)"
          {
            echo "## Backend Release Draft Gate"
            echo "- Service: \`${SERVICE}\`"
            echo "- Release tag: \`${RELEASE_TAG}\`"
            echo "- Tag commit: \`${TAG_SHA}\`"
            echo "- Docker image: \`${IMAGE_NAME}:${IMAGE_TAG}\`"
            echo "- Main ancestry: \`passed\`"
            echo "- Draft release metadata: \`passed\`"
            echo "- Main CI evidence: \`passed\`"
            echo
            echo "### Last-tag diff summary"
            echo '```'
            echo "${diff_summary:-No file changes detected for the tagged commit itself.}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "[release-draft-gate] release draft gate passed"
