# 기본 서버 설정
app: # 애플리케이션 및 배포 정보
  type: admin
  cors:
    allowed-origins:
      - http://localhost:5173
  info:
    server-name: ${SERVER_NAME:unknown}
    environment: ${SPRING_PROFILES_ACTIVE:local}
    git-branch: ${GIT_BRANCH:unknown}
    git-commit: ${GIT_COMMIT:unknown}
    git-build-time: ${BUILD_TIME:unknown}
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /admin/api
    encoding:
      charset: UTF-8
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css
    min-response-size: 1024
  tomcat:
    threads:
      max: 15
    max-connections: 20
    connection-timeout: 5000

spring:
  profiles:
    include:
      - datasource
      - external
  jackson:
    time-zone: Asia/Seoul

# Spring Security
security:
  jwt:
    secret-key: ${JWT_SECRET_KEY}
    access-token-expiration: 86400 # 하루 (24시간)
    refresh-token-expiration: 2592000 # 한 달 (30일)
  nonce:
    salt: ${NONCE_SALT:bottle-note-secure-salt-2024}
apple:
  bundle-id: "com.bottlenote.official.app"

# 기본 로깅 설정
logging:
  level:
    root: info

# OTEL 비활성화
management:
  tracing:
    enabled: false
  otlp:
    metrics:
      export:
        enabled: false

schedules:
  history:
    view:
      sync:
        enable: false

alcohol:
  lookup:
    local-cache:
      enabled: ${ALCOHOL_LOOKUP_LOCAL_CACHE_ENABLED:true}
      version-check-interval-ms: ${ALCOHOL_LOOKUP_LOCAL_CACHE_VERSION_CHECK_INTERVAL_MS:1000}

curation:
  spec-sync:
    enabled: ${CURATION_SPEC_SYNC_ENABLED:true}

root:
  admin:
    email: ${ROOT_ADMIN_EMAIL:email@email.com}
    password: ${ROOT_ADMIN_PASSWORD}

--- # default/local 프로파일 (동일 설정)
spring:
  config:
    activate:
      on-profile: default,local
logging:
  level:
    root: info
    app.bottlenote: info
management:
  tracing:
    enabled: false
  otlp:
    metrics:
      export:
        enabled: false
server:
  tomcat:
    threads:
      max: 15
    max-connections: 20
    connection-timeout: 5000

--- # debug 프로파일 (디버그 로그만, SQL 로깅 없음)
spring:
  config:
    activate:
      on-profile: debug

logging:
  level:
    root: debug
    app.bottlenote: debug
    org.springframework: debug
    org.hibernate.SQL: off
    org.hibernate.orm.jdbc.bind: off

management:
  tracing:
    enabled: false
  otlp:
    metrics:
      export:
        enabled: false

server:
  tomcat:
    threads:
      max: 15
    max-connections: 20
    connection-timeout: 5000

--- # dev 프로파일 (개발 서버)
app:
  cors:
    allowed-origins:
      - https://admin.development.bottle-note.com
      - http://localhost:5173

spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    root: info
    app.bottlenote: info

management:
  tracing:
    enabled: false
  otlp:
    metrics:
      export:
        enabled: false

server:
  tomcat:
    threads:
      max: 100
    max-connections: 500
    connection-timeout: 30000

--- # prod 프로파일 (운영 서버)
app:
  cors:
    allowed-origins:
      - https://admin.bottle-note.com

spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    root: info
    app.bottlenote: info

management:
  tracing:
    enabled: false
  otlp:
    metrics:
      export:
        enabled: false

server:
  tomcat:
    threads:
      max: 100
    max-connections: 500
    connection-timeout: 30000

--- # lookup-perf 프로파일 (로컬 성능 검증 전용)
spring:
  config:
    activate:
      on-profile: lookup-perf

server:
  tomcat:
    threads:
      max: ${LOOKUP_PERF_TOMCAT_THREADS_MAX:64}
    max-connections: ${LOOKUP_PERF_TOMCAT_MAX_CONNECTIONS:512}
    connection-timeout: ${LOOKUP_PERF_TOMCAT_CONNECTION_TIMEOUT:10000}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
