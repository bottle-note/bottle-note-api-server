# Batch 서버 설정

app:
  type: batch
  info:
    server-name: ${SERVER_NAME:unknown}
    environment: ${SPRING_PROFILES_ACTIVE:local}
    git-branch: ${GIT_BRANCH:unknown}
    git-commit: ${GIT_COMMIT:unknown}
    git-build-time: ${BUILD_TIME:unknown}

server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: bottlenote-batch
  profiles:
    include:
      - datasource
      - external
  jackson:
    time-zone: Asia/Seoul

  # Batch 설정
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never

  # Quartz 설정
  quartz:
    overwrite-existing-jobs: true
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    properties:
      org:
        quartz:
          scheduler:
            instanceName: bottle_note_quartz_scheduler
            instanceId: AUTO
          threadPool:
            threadCount: 5
            threadPriority: 5
          jobStore:
            driverDelegateClass: org.quartz.impl.jdbcjobstore.StdJDBCDelegate
            isClustered: true
            clusterCheckinInterval: 20000

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
  otlp:
    metrics:
      export:
        enabled: false
    tracing:
      endpoint: ""
  tracing:
    enabled: false

schedules:
  history:
    view:
      sync:
        enable: false

batch:
  visitor-telemetry:
    enabled: false
    stream-key: visitor-telemetry
    group-name: visitor-telemetry-writers
    dead-letter-stream-key: visitor-telemetry-dead-letter
    consumer-name: ${HOSTNAME:bottlenote-batch-local}
    batch-size: 200
    block-timeout: 2s
    retry-backoff: 5s
    pending-idle: 1m
    dead-letter-max-length: 10000

logging:
  level:
    root: info

security:
  jwt:
    secret-key: ${JWT_SECRET_KEY}
  nonce:
    salt: ${NONCE_SALT:bottle-note-secure-salt-2024}

---
spring:
  config:
    activate:
      on-profile: local,dev,prod

batch:
  visitor-telemetry:
    enabled: true
